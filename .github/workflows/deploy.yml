name: Deploy Metrics Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'

    - name: Verify
      run: npm run check

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      env:
        METRICS_ADMIN_TOKEN: ${{ secrets.METRICS_ADMIN_TOKEN }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        envs: METRICS_ADMIN_TOKEN
        script: |
          # 任何一步失败立即中止，不再静默继续
          set -e

          # 创建项目目录
          mkdir -p /var/www/metrics
          cd /var/www/metrics

          # 同步最新代码；git 失败直接让部署失败，而不是用旧代码继续
          if [ -d .git ]; then
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/OrangeK1NG-714/vb-metrics.git .
          fi

          # 如果有 package.json 就安装依赖（metrics 是零依赖，跳过也行）
          # npm install --production 2>/dev/null || echo "No dependencies"

          # 用 PM2 启动或重启服务
          pm2 describe metrics > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            NODE_ENV=production METRICS_HOST=127.0.0.1 METRICS_ADMIN_TOKEN="$METRICS_ADMIN_TOKEN" pm2 restart metrics --update-env
          else
            NODE_ENV=production METRICS_HOST=127.0.0.1 METRICS_ADMIN_TOKEN="$METRICS_ADMIN_TOKEN" pm2 start index.js --name metrics -e /var/log/pm2/metrics-error.log -o /var/log/pm2/metrics-out.log
          fi

          # 保存 PM2 配置（开机自启）
          pm2 save

          echo "✅ Metrics deployed successfully"

    - name: Bark 通知
      if: always()
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        if [ -z "$BARK_KEY" ]; then echo "BARK_KEY 未配置，跳过通知"; exit 0; fi
        if [ "${{ job.status }}" = "success" ]; then ICON="✅"; else ICON="❌"; fi
        curl -fsS -m 10 -X POST "https://api.day.app/push" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"device_key\":\"$BARK_KEY\",\"title\":\"$ICON ${{ github.repository }}\",\"body\":\"${{ github.workflow }} · ${{ github.ref_name }} · ${{ job.status }} · ${GITHUB_SHA:0:7}\",\"group\":\"GitHub CI\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          || echo "Bark 通知发送失败（不影响构建）"
