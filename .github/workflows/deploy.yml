name: Deploy Metrics Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'

    - name: Verify
      run: npm run check

    - name: Push code to server
      # 服务器连 GitHub 不稳定（GFW 间歇阻断），不再在服务器上 git fetch ——
      # CI runner 打包直推。务必排除 data/ 和 *.sqlite：服务器上的
      # /var/www/metrics/data/metrics.sqlite 是生产数据库，绝不能覆盖。
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        tar czf - \
          --exclude=.git --exclude=node_modules --exclude=data --exclude="*.sqlite*" \
          . | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "mkdir -p /var/www/metrics && cd /var/www/metrics && tar xzf -"

    - name: Restart service
      uses: appleboy/ssh-action@v1.0.3
      env:
        METRICS_ADMIN_TOKEN: ${{ secrets.METRICS_ADMIN_TOKEN }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        envs: METRICS_ADMIN_TOKEN
        script: |
          # 任何一步失败立即中止，不再静默继续
          set -e
          cd /var/www/metrics

          # metrics 零依赖（node:sqlite），无需 npm install

          # 用 PM2 启动或重启服务
          if pm2 describe metrics > /dev/null 2>&1; then
            NODE_ENV=production METRICS_HOST=127.0.0.1 METRICS_ADMIN_TOKEN="$METRICS_ADMIN_TOKEN" pm2 restart metrics --update-env
          else
            NODE_ENV=production METRICS_HOST=127.0.0.1 METRICS_ADMIN_TOKEN="$METRICS_ADMIN_TOKEN" pm2 start index.js --name metrics -e /var/log/pm2/metrics-error.log -o /var/log/pm2/metrics-out.log
          fi

          # 保存 PM2 配置（开机自启）
          pm2 save

          # 部署后真实健康检查
          sleep 1
          curl -sf http://127.0.0.1:8787/health

          echo "✅ Metrics deployed successfully"

    - name: Bark 通知
      if: always()
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        if [ -z "$BARK_KEY" ]; then echo "BARK_KEY 未配置，跳过通知"; exit 0; fi
        if [ "${{ job.status }}" = "success" ]; then ICON="✅"; RESULT="成功"; else ICON="❌"; RESULT="失败"; fi
        curl -fsS -m 10 -X POST "https://api.day.app/push" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"device_key\":\"$BARK_KEY\",\"title\":\"$ICON ${{ github.repository }} $RESULT\",\"body\":\"工作流：${{ github.workflow }} · 分支：${{ github.ref_name }} · 提交：${GITHUB_SHA:0:7}\",\"group\":\"GitHub CI\",\"icon\":\"https://stats.richardq.tech/icons/metrics.png\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          || echo "Bark 通知发送失败（不影响构建）"
